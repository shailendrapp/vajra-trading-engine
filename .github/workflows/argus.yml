name: Vajra Trading Engine

on:
  schedule:
    # Startup: 6:25 AM PT (13:25 UTC)
    - cron: '25 13 * * 1-5'
    # BIC Window 1: 10:15 AM ET = 7:15 AM PT (14:15 UTC)
    - cron: '15 14 * * 1-5'
    # BIC Window 2: 11:15 AM ET = 8:15 AM PT (15:15 UTC)
    - cron: '15 15 * * 1-5'
    # BIC Window 3: 12:15 PM ET = 9:15 AM PT (16:15 UTC)
    - cron: '15 16 * * 1-5'
    # EOD Close: 2:30 PM ET = 11:30 AM PT (18:30 UTC)
    - cron: '30 18 * * 1-5'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'bic_scan'
        type: choice
        options:
          - startup
          - bic_scan
          - eod_close
          - dry_run

concurrency:
  group: vajra-trading-engine
  cancel-in-progress: false

jobs:
  run-vajra:
    name: Vajra - ${{ github.event.schedule || github.event.inputs.mode || 'manual' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15    # ← Hard cap: kills runaway jobs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: data/trades.db
          key: argus-trades-db
          restore-keys: argus-trades-db

      - name: Prepare directories
        run: mkdir -p data logs

      - name: Determine run mode
        id: mode
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          INPUT_MODE="${{ github.event.inputs.mode }}"
          
          if [ -n "$INPUT_MODE" ]; then
            echo "mode=$INPUT_MODE" >> $GITHUB_OUTPUT
          elif [ "$SCHEDULE" = "25 13 * * 1-5" ]; then
            echo "mode=startup" >> $GITHUB_OUTPUT
          elif [ "$SCHEDULE" = "30 18 * * 1-5" ]; then
            echo "mode=eod_close" >> $GITHUB_OUTPUT
          else
            echo "mode=bic_scan" >> $GITHUB_OUTPUT
          fi

      - name: Run Engine
        env:
          TRADIER_API_KEY:    ${{ secrets.TRADIER_API_KEY }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          FLASHALPHA_API_KEY: ${{ secrets.FLASHALPHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STARTING_EQUITY:    ${{ secrets.STARTING_EQUITY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PATH:            data/trades.db
          LOG_DIR:            logs/
          RUN_MODE:           ${{ steps.mode.outputs.mode }}
        run: python engine.py --mode ${{ steps.mode.outputs.mode }}

      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/trades.db
          key: argus-trades-db

      - name: Upload logs
        if: failure()    # ← Only upload on failure, saves storage
        uses: actions/upload-artifact@v4
        with:
          name: vajra-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7    # ← Reduced from 30
