name: Vajra Trading Engine

on:
  schedule:
    # ── Startup: 6:25 AM PT (13:25 UTC Nov-Mar / 14:25 UTC Mar-Nov) ──────────
    # GitHub Actions crons are UTC; we schedule both PST and PDT offsets.
    # The engine checks the actual time internally so duplicate fires are safe.
    - cron: '25 13 * * 1-5'   # 6:25 AM PDT (summer)
    - cron: '25 14 * * 1-5'   # 6:25 AM PST (winter)

    # ── BIC Window 1: 10:15 AM ET = 14:15 / 15:15 UTC ──────────────────────
    - cron: '15 14 * * 1-5'   # EDT (summer)
    - cron: '15 15 * * 1-5'   # EST (winter)

    # ── BIC Window 2: 11:15 AM ET = 15:15 / 16:15 UTC ──────────────────────
    - cron: '15 15 * * 1-5'   # EDT (summer)
    - cron: '15 16 * * 1-5'   # EST (winter)

    # ── BIC Window 3: 12:15 PM ET = 16:15 / 17:15 UTC ──────────────────────
    - cron: '15 16 * * 1-5'   # EDT (summer)
    - cron: '15 17 * * 1-5'   # EST (winter)

    # ── EOD Close: 2:30 PM ET = 18:30 / 19:30 UTC ───────────────────────────
    - cron: '30 18 * * 1-5'   # EDT (summer)
    - cron: '30 19 * * 1-5'   # EST (winter)

  workflow_dispatch:
    inputs:
      mode:
        description: 'Which phase to run'
        required: true
        default: 'bic_scan'
        type: choice
        options:
          - startup
          - bic_scan
          - eod_close
      dry_run:
        description: 'Dry run (no orders placed)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# Only one run at a time — if a new trigger fires while one is running,
# cancel the new one (keep the active trade job alive)
concurrency:
  group: vajra-trading-engine
  cancel-in-progress: false

jobs:
  run-vajra:
    name: Vajra [${{ github.event.inputs.mode || 'cron' }}]
    runs-on: ubuntu-latest
    timeout-minutes: 15    # Hard cap — kills any runaway job after 15 min

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Restore DB ──────────────────────────────────────────────────────
      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: data/trades.db
          key: argus-trades-db
          restore-keys: argus-trades-db

      - name: Prepare directories
        run: |
          mkdir -p data logs
          if [ -f data/trades.db ]; then
            echo "✅ Database restored"
            ls -lh data/trades.db
          else
            echo "ℹ️  No previous database — starting fresh"
          fi

      # ── 5. Determine mode ──────────────────────────────────────────────────
      # Cron triggers don't carry a mode input, so we derive it from
      # the schedule string and current UTC hour.
      - name: Determine run mode
        id: mode
        run: |
          INPUT_MODE="${{ github.event.inputs.mode }}"
          if [ -n "$INPUT_MODE" ]; then
            echo "mode=$INPUT_MODE" >> $GITHUB_OUTPUT
            echo "▶ Manual trigger — mode: $INPUT_MODE"
          else
            # Derive from UTC hour:
            #   13 or 14 UTC at :25 → startup
            #   14 or 15 UTC at :15 → bic_scan (window 1)
            #   15 or 16 UTC at :15 → bic_scan (window 2)
            #   16 or 17 UTC at :15 → bic_scan (window 3)
            #   18 or 19 UTC at :30 → eod_close
            MINUTE=$(date -u +%M)
            HOUR=$(date -u +%H)
            if [ "$MINUTE" = "25" ]; then
              echo "mode=startup" >> $GITHUB_OUTPUT
              echo "▶ Cron — mode: startup"
            elif [ "$MINUTE" = "30" ]; then
              echo "mode=eod_close" >> $GITHUB_OUTPUT
              echo "▶ Cron — mode: eod_close"
            else
              echo "mode=bic_scan" >> $GITHUB_OUTPUT
              echo "▶ Cron — mode: bic_scan (UTC ${HOUR}:${MINUTE})"
            fi
          fi

      # ── 6. Validate ────────────────────────────────────────────────────────
      - name: Run system validation
        env:
          TRADIER_API_KEY:    ${{ secrets.TRADIER_API_KEY }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          FLASHALPHA_API_KEY: ${{ secrets.FLASHALPHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STARTING_EQUITY:    ${{ secrets.STARTING_EQUITY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tests/validate.py

      # ── 7. Run engine phase ────────────────────────────────────────────────
      - name: Run Vajra Engine — ${{ steps.mode.outputs.mode }}
        env:
          TRADIER_API_KEY:    ${{ secrets.TRADIER_API_KEY }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          FLASHALPHA_API_KEY: ${{ secrets.FLASHALPHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STARTING_EQUITY:    ${{ secrets.STARTING_EQUITY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PATH:            data/trades.db
          LOG_DIR:            logs/
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 Dry run enabled"
            python engine.py --mode "$MODE" --dry-run
          else
            python engine.py --mode "$MODE"
          fi

      # ── 8. Save DB ─────────────────────────────────────────────────────────
      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/trades.db
          key: argus-trades-db

      # ── 9. Upload logs (failures only) ────────────────────────────────────
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vajra-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
