name: Vajra Trading Engine

on:
  schedule:
    # 6:25 AM PT weekdays
    # PDT (summer): 13:25 UTC
    # PST (winter): 14:25 UTC
    - cron: '25 13 * * 1-5'
    - cron: '25 14 * * 1-5'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no orders placed)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# Prevent duplicate runs — keep active session alive
concurrency:
  group: vajra-trading-engine
  cancel-in-progress: false

jobs:
  run-vajra:
    name: Vajra Trading Engine
    runs-on: ubuntu-latest
    timeout-minutes: 420   # 7 hours — covers full 6:25 AM to 1:15 PM PT session

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencies ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Restore DB + FlashAlpha cache ────────────────────────────────────
      - name: Restore database and caches
        uses: actions/cache/restore@v4
        with:
          path: |
            data/trades.db
            data/flashalpha_cache.json
          key: argus-trades-db
          restore-keys: argus-trades-db

      - name: Prepare directories
        run: |
          mkdir -p data logs
          if [ -f data/trades.db ]; then
            echo "✅ Database restored from previous run"
            ls -lh data/trades.db
          else
            echo "ℹ️  No previous database — starting fresh"
          fi

      # ── 5. Validate ─────────────────────────────────────────────────────────
      - name: Run system validation
        env:
          TRADIER_API_KEY:    ${{ secrets.TRADIER_API_KEY }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          FLASHALPHA_API_KEY: ${{ secrets.FLASHALPHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STARTING_EQUITY:    ${{ secrets.STARTING_EQUITY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tests/validate.py

      # ── 6. Run engine ───────────────────────────────────────────────────────
      - name: Run Vajra Engine
        env:
          TRADIER_API_KEY:    ${{ secrets.TRADIER_API_KEY }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          FLASHALPHA_API_KEY: ${{ secrets.FLASHALPHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STARTING_EQUITY:    ${{ secrets.STARTING_EQUITY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PATH:            data/trades.db
          LOG_DIR:            logs/
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "🔍 Running in DRY-RUN mode"
            python engine.py --dry-run
          else
            echo "🚀 Running in PAPER trading mode"
            python engine.py
          fi

      # ── 7. Save DB + FlashAlpha cache ────────────────────────────────────────
      - name: Save database and caches for next run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/trades.db
            data/flashalpha_cache.json
          key: argus-trades-db

      # ── 8. Upload logs ───────────────────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vajra-logs-${{ github.run_id }}
          path: |
            logs/
            data/trades.db
          retention-days: 30
