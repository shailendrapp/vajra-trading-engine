name: Vajra Trading Engine

on:
  schedule:
    - cron: '05 13 * * 1-5'   # 6:05 AM PDT startup (before 9:45 AM ET window)
    - cron: '05 14 * * 1-5'   # 6:05 AM PST startup (before 9:45 AM ET window)
    - cron: '15 14 * * 1-5'   # BIC window 1 EDT
    - cron: '15 15 * * 1-5'   # BIC window 1 EST / window 2 EDT
    - cron: '15 16 * * 1-5'   # BIC window 2 EST / window 3 EDT
    - cron: '15 17 * * 1-5'   # BIC window 3 EST
    - cron: '*/5 14-19 * * 1-5'  # monitor every 5min EDT
    - cron: '*/5 15-20 * * 1-5'  # monitor every 5min EST
    - cron: '35 19 * * 1-5'   # EOD close EDT
    - cron: '35 20 * * 1-5'   # EOD close EST

  workflow_dispatch:
    inputs:
      mode:
        description: 'Which phase to run'
        required: true
        default: 'bic_scan'
        type: choice
        options:
          - startup
          - bic_scan
          - monitor
          - eod_close
      dry_run:
        description: 'Dry run (no orders placed)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: vajra-trading-engine
  cancel-in-progress: false

jobs:
  run-vajra:
    name: Vajra [${{ github.event.inputs.mode || 'cron' }}]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: |
            data/trades.db
            data/flashalpha_cache.json
          key: argus-trades-db
          restore-keys: argus-trades-db

      - name: Prepare directories
        run: |
          mkdir -p data logs
          if [ -f data/trades.db ]; then
            echo "✅ Database restored"
            ls -lh data/trades.db
          else
            echo "ℹ️  No previous database"
          fi

      - name: Determine run mode
        id: mode
        run: |
          INPUT_MODE="${{ github.event.inputs.mode }}"
          if [ -n "$INPUT_MODE" ]; then
            echo "mode=$INPUT_MODE" >> $GITHUB_OUTPUT
            echo "▶ Manual — mode: $INPUT_MODE"
          else
            MINUTE=$(date -u +%M)
            HOUR=$(date -u +%H)
            if [ "$MINUTE" = "25" ]; then
              echo "mode=startup" >> $GITHUB_OUTPUT
            elif [ "$MINUTE" = "35" ]; then
              echo "mode=eod_close" >> $GITHUB_OUTPUT
            elif [ "$MINUTE" = "15" ]; then
              echo "mode=bic_scan" >> $GITHUB_OUTPUT
            else
              echo "mode=monitor" >> $GITHUB_OUTPUT
            fi
            echo "▶ Cron mode: $(cat $GITHUB_OUTPUT | grep mode | cut -d= -f2) UTC ${HOUR}:${MINUTE}"
          fi

      - name: Run system validation
        env:
          TRADIER_API_KEY:    ${{ secrets.TRADIER_API_KEY }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          FLASHALPHA_API_KEY: ${{ secrets.FLASHALPHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STARTING_EQUITY:    ${{ secrets.STARTING_EQUITY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tests/validate.py

      - name: Run Vajra Engine — ${{ steps.mode.outputs.mode }}
        env:
          TRADIER_API_KEY:    ${{ secrets.TRADIER_API_KEY }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          FLASHALPHA_API_KEY: ${{ secrets.FLASHALPHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STARTING_EQUITY:    ${{ secrets.STARTING_EQUITY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PATH:            data/trades.db
          LOG_DIR:            logs/
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 Dry run"
            python engine.py --mode "$MODE" --dry-run
          else
            echo "🚀 PAPER trading mode"
            python engine.py --mode "$MODE"
          fi

      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/trades.db
            data/flashalpha_cache.json
          key: argus-trades-db

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vajra-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
