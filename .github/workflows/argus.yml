name: Argus Trading Engine

on:
  schedule:
    # 6:25 AM PT weekdays = 13:25 UTC (PST) / 14:25 UTC (PDT)
    - cron: '25 13 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no orders placed)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# Prevent duplicate runs — if a new run starts while one is in progress,
# cancel the NEW one (keep the existing trading session alive)
concurrency:
  group: argus-trading-engine
  cancel-in-progress: false

jobs:
  run-argus:
    name: Run Argus Trading Engine
    runs-on: ubuntu-latest
    timeout-minutes: 420   # 7 hours max

    steps:
      # ── 1. Checkout repo ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Restore DB from cache ───────────────────────────────────────
      # Uses actions/cache with a fixed key so each run overwrites
      # the previous one. The DB carries open positions, daily state,
      # and trade history across runs.
      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: data/trades.db
          key: argus-trades-db
          restore-keys: argus-trades-db

      - name: Prepare data directory
        run: |
          mkdir -p data logs
          if [ -f data/trades.db ]; then
            echo "✅ Database restored from previous run"
            ls -lh data/trades.db
          else
            echo "ℹ️  No previous database found — starting fresh"
          fi

      # ── 5. Validate system before trading ─────────────────────────────
      - name: Run system validation
        env:
          TRADIER_API_KEY:    ${{ secrets.TRADIER_API_KEY }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          FLASHALPHA_API_KEY: ${{ secrets.FLASHALPHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STARTING_EQUITY:    ${{ secrets.STARTING_EQUITY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tests/validate.py

      # ── 6. Run the engine ──────────────────────────────────────────────
      - name: Run Argus Engine
        env:
          TRADIER_API_KEY:    ${{ secrets.TRADIER_API_KEY }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          FLASHALPHA_API_KEY: ${{ secrets.FLASHALPHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STARTING_EQUITY:    ${{ secrets.STARTING_EQUITY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PATH:            data/trades.db
          LOG_DIR:            logs/
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "🔍 Running in DRY-RUN mode"
            python engine.py --dry-run
          else
            echo "🚀 Running in PAPER trading mode"
            python engine.py
          fi

      # ── 7. Save DB to cache for next run ──────────────────────────────
      # Runs even if engine crashed so open positions are never lost
      - name: Save database for next run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/trades.db
          key: argus-trades-db

      # ── 8. Upload full logs for debugging ─────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: argus-logs-${{ github.run_id }}
          path: |
            logs/
            data/trades.db
          retention-days: 30
