name: Vajra Trading Engine

on:
  schedule:
    # Single long-running job — engine handles all windows internally
    # Start 9:20 AM ET = 10 min before 9:30 AM market open
    # PDT (summer, Mar-Nov): UTC-7 → 9:20 AM ET = 6:20 AM PT = 13:20 UTC
    # PST (winter, Nov-Mar): UTC-8 → 9:20 AM ET = 6:20 AM PT = 14:20 UTC
    # Only ONE cron active at a time — comment out the other season
    - cron: '20 13 * * 1-5'   # ← ACTIVE: 9:20 AM ET PDT (summer — through Nov 2)
    # - cron: '20 14 * * 1-5' # ← INACTIVE: 9:20 AM ET PST (re-enable Nov 2)

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no orders placed)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: vajra-trading-engine
  cancel-in-progress: false

jobs:
  run-vajra:
    name: Vajra Trading Engine
    runs-on: ubuntu-latest
    timeout-minutes: 420   # 7 hours — covers full 9:20 AM ET to 4:15 PM ET session

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: |
            data/trades.db
            data/flashalpha_cache.json
          key: argus-trades-db
          restore-keys: argus-trades-db

      - name: Prepare directories
        run: |
          mkdir -p data logs
          if [ -f data/trades.db ]; then
            echo "✅ Database restored"
            ls -lh data/trades.db
          else
            echo "ℹ️  No previous database"
          fi

      - name: Run system validation
        env:
          TRADIER_API_KEY:    ${{ secrets.TRADIER_API_KEY }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          FLASHALPHA_API_KEY: ${{ secrets.FLASHALPHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STARTING_EQUITY:    ${{ secrets.STARTING_EQUITY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tests/validate.py

      - name: Run Vajra Engine
        env:
          TRADIER_API_KEY:    ${{ secrets.TRADIER_API_KEY }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          FLASHALPHA_API_KEY: ${{ secrets.FLASHALPHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STARTING_EQUITY:    ${{ secrets.STARTING_EQUITY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PATH:            data/trades.db
          LOG_DIR:            logs/
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 Running in DRY-RUN mode"
            python engine.py --dry-run
          else
            echo "🚀 Running in PAPER trading mode"
            python engine.py
          fi

      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/trades.db
            data/flashalpha_cache.json
          key: argus-trades-db

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vajra-logs-${{ github.run_id }}
          path: |
            logs/
            data/trades.db
          retention-days: 30
